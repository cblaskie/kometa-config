# Kometa Global Configuration - Blaskielab Edition (Posterizarr Sync)
############################################################

# --- SERVICE CONNECTIONS ---
plex:
  url: http://plex:32400
  token: xrp4J6m9ozCTthazZW9i
  timeout: 60
  clean_bundles: false
  empty_trash: false
  optimize: false

tmdb:
  apikey: d65938742f6855ddf5001f4ef2bddca1
  language: en
  cache_expiration: 60

mdblist:
  apikey: y9hu9i4z1qbgcnc30q9dzmpva
  cache_expiration: 60

omdb:
  apikey: 44c00535
  cache_expiration: 60

# --- LIBRARIES ---
libraries:
  Movies:
    # 👈 POINTS DIRECTLY to Posterizarr's output folder inside your assets share
    asset_directory: config/assets/Movies 
    collection_files:
      - file: config/collections/movies.yml
      - file: config/collections/collections-movies.yml
    overlay_files:
      - pmm: studio
        template_variables:
          style: logo-only     # Minimalist: no background box
          horizontal_align: left
          vertical_align: top
          opacity: 60
          addon: pmm
    report_path: config/reports/movies.png

  Kids Movies:
    # 👈 POINTS DIRECTLY to Posterizarr's kids movie folder
    asset_directory: config/assets/Kids Movies 
    collection_files:
      - file: config/collections/movies-kids.yml
      - file: config/collections/collections-movies-kids.yml
    overlay_files:
      - pmm: studio
        template_variables:
          style: logo-only
          horizontal_align: left
          vertical_align: top
          opacity: 60
          addon: pmm

  TV Shows:
    # 👈 POINTS DIRECTLY to Posterizarr's TV show folder
    asset_directory: config/assets/TV Shows 
    collection_files:
      - file: config/collections/tv.yml
      - file: config/collections/collections-tv.yml
    overlay_files:
      - pmm: streaming         # Priority: Netflix, Disney+, etc.
        template_variables:
          group: brand_logo
          style: minimal
          horizontal_align: left
          vertical_align: top
          opacity: 70
      - pmm: network           # Fallback: HBO, AMC, etc.
        template_variables:
          group: brand_logo
          style: minimal
          horizontal_align: left
          vertical_align: top
          opacity: 70

  Kids TV:
    # 👈 POINTS DIRECTLY to Posterizarr's Kids TV show folder
    asset_directory: config/assets/Kids TV 
    collection_files:
      - file: config/collections/tv-kids.yml
      - file: config/collections/collections-tv-kids.yml
    overlay_files:
      - pmm: streaming
        template_variables:
          group: brand_logo
          style: minimal
          opacity: 70

# --- GLOBAL SETTINGS ---
settings:
  cache: true
  cache_expiration: 60
  asset_directory: config/assets
  asset_folders: false           # 🌟 CHANGED TO FALSE: Tells Kometa to expect loose images named after titles
  asset_depth: 0
  prioritize_assets: true      # 🌟 FORCE: Uses Posterizarr's cooked art first
  run_order:
    - metadata
    - collections
    - overlays                   # 🌟 CRUCIAL: Overlays execute last, applying logos on top of Posterizarr's art

operations:
  delete_collections:
    configured: false
    unmanaged: false
